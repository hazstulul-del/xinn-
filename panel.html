<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XINN SYSTEM // PANEL ADMIN</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #0a0005;
            font-family: 'Share Tech Mono', monospace;
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Animated Background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                linear-gradient(rgba(255,45,120,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,45,120,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
            animation: gridMove 15s linear infinite;
        }

        @keyframes gridMove {
            0% { background-position: 0 0; }
            100% { background-position: 40px 40px; }
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: rgba(10,0,5,0.9);
            backdrop-filter: blur(20px);
            border: 2px solid #ff2d78;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 
                0 0 30px rgba(255,45,120,0.5),
                0 0 60px rgba(179,0,255,0.3);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            font-weight: 900;
            color: #ff2d78;
            text-shadow: 0 0 20px #ff2d78, 0 0 40px #b300ff;
            letter-spacing: 3px;
            animation: glitch 1s infinite;
        }

        @keyframes glitch {
            0%, 100% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(2px, -2px); }
            60% { transform: translate(-1px, -1px); }
            80% { transform: translate(1px, 1px); }
        }

        .subtitle {
            color: #ff69b4;
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .panel-box {
            background: rgba(0,0,0,0.5);
            border: 1px solid #b300ff;
            border-radius: 15px;
            padding: 25px;
            margin: 20px 0;
        }

        .panel-title {
            font-family: 'Orbitron', sans-serif;
            color: #00ffff;
            font-size: 1.1rem;
            margin-bottom: 20px;
            text-align: center;
            text-shadow: 0 0 10px #00ffff;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            color: #ff69b4;
            margin-bottom: 8px;
            font-size: 0.85rem;
            font-weight: bold;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            background: #0a0005;
            border: 1px solid #ff2d78;
            border-radius: 10px;
            color: #fff;
            font-family: 'Share Tech Mono', monospace;
            font-size: 1rem;
            transition: 0.3s;
            outline: none;
        }

        .input-group input:focus {
            border-color: #00ffff;
            box-shadow: 0 0 20px rgba(0,255,255,0.3);
        }

        .btn-generate {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #ff2d78, #b300ff);
            border: none;
            border-radius: 50px;
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 3px;
            text-shadow: 0 0 5px #fff;
            box-shadow: 0 0 30px rgba(255,45,120,0.6);
            transition: 0.3s;
            margin: 10px 0;
        }

        .btn-generate:hover {
            transform: scale(1.03);
            box-shadow: 0 0 50px rgba(255,45,120,0.9);
        }

        .btn-copy {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 1px solid #00ffff;
            border-radius: 50px;
            color: #00ffff;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-copy:hover {
            background: rgba(0,255,255,0.1);
            box-shadow: 0 0 20px rgba(0,255,255,0.3);
        }

        .result-box {
            background: #000;
            border: 1px solid #00ffff;
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
            display: none;
            word-break: break-all;
        }

        .result-box.active {
            display: block;
        }

        .result-label {
            color: #00ff88;
            font-size: 0.8rem;
            margin-bottom: 5px;
        }

        .result-link {
            color: #00ffff;
            font-size: 0.85rem;
            font-family: 'Share Tech Mono', monospace;
        }

        .footer {
            text-align: center;
            font-size: 0.7rem;
            color: #b300ff;
            margin-top: 20px;
            opacity: 0.7;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #00ff88;
            color: #000;
            padding: 15px 25px;
            border-radius: 10px;
            font-weight: bold;
            z-index: 1000;
            transform: translateX(150%);
            transition: 0.3s ease;
        }

        .toast.show {
            transform: translateX(0);
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1 class="logo">XINN PANEL</h1>
            <p class="subtitle">🔐 ADMIN CONTROL CENTER</p>
        </div>

        <!-- Panel Box -->
        <div class="panel-box">
            <p class="panel-title">⚡ GENERATE LOCK LINK</p>

            <div class="input-group">
                <label>📱 NOMOR HP TARGET</label>
                <input type="text" id="targetNumber" placeholder="Contoh: 081234567890">
            </div>

            <div class="input-group">
                <label>🔑 UNLOCK PIN (6 KARAKTER)</label>
                <input type="text" id="customPIN" placeholder="Contoh: XINNIMUT" maxlength="6">
            </div>

            <div class="input-group">
                <label>💸 083175050030</label>
                <input type="text" id="danaNumber" placeholder="085396340845" value="085396340845">
            </div>

            <div class="input-group">
                <label>📞 @xinn_93</label>
                <input type="text" id="telegramUser" placeholder="@xinnimut" value="@xinnimut">
            </div>

            <button class="btn-generate" onclick="generateLink()">
                🚀 BUAT LINK
            </button>
        </div>

        <!-- Result Box -->
        <div class="result-box" id="resultBox">
            <p class="result-label">✅ LINK BERHASIL DIBUAT:</p>
            <p class="result-link" id="resultLink"></p>
            <button class="btn-copy" onclick="copyLink()">📋 COPY LINK</button>
            <button class="btn-copy" onclick="previewLink()" style="margin-top:5px;">👁️ PREVIEW</button>
        </div>

        <p class="footer">#XinnIsHere ❤️ | XINN SYSTEM v1.0</p>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">✅ Link Disalin!</div>

    <script>
        let generatedLink = '';

        function generateLink() {
            const target = document.getElementById('targetNumber').value.trim();
            const pin = document.getElementById('customPIN').value.trim();
            const dana = document.getElementById('danaNumber').value.trim();
            const tele = document.getElementById('telegramUser').value.trim();

            if (!target) return showToast('❌ Masukkan nomor target!');
            if (!pin || pin.length < 4) return showToast('❌ PIN minimal 4 karakter!');

            // Generate link dengan parameter
            const baseURL = window.location.href.replace('panel.html', 'lock.html');
            const params = new URLSearchParams({
                target: target,
                pin: pin.toUpperCase(),
                dana: dana,
                tele: tele
            });

            generatedLink = `${baseURL}?${params.toString()}`;
            
            document.getElementById('resultLink').textContent = generatedLink;
            document.getElementById('resultBox').classList.add('active');
            
            showToast('✅ Link berhasil dibuat!');
        }

        function copyLink() {
            if (!generatedLink) return;
            
            if (navigator.clipboard) {
                navigator.clipboard.writeText(generatedLink).then(() => {
                    showToast('📋 Link disalin ke clipboard!');
                });
            } else {
                // Fallback
                const textarea = document.createElement('textarea');
                textarea.value = generatedLink;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showToast('📋 Link disalin!');
            }
        }

        function previewLink() {
            if (!generatedLink) return;
            window.open(generatedLink, '_blank');
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }
    </script>
</body>
  </html>
