<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XINN PANEL</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0005;
            font-family: 'Share Tech Mono', monospace;
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background:
                linear-gradient(rgba(255,45,120,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,45,120,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
        }
        .container {
            max-width: 550px;
            width: 100%;
            background: rgba(10,0,5,0.9);
            backdrop-filter: blur(20px);
            border: 2px solid #ff2d78;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 0 30px rgba(255,45,120,0.5), 0 0 60px rgba(179,0,255,0.3);
        }
        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            font-weight: 900;
            color: #ff2d78;
            text-shadow: 0 0 20px #ff2d78, 0 0 40px #b300ff;
            text-align: center;
            letter-spacing: 3px;
        }
        .subtitle {
            color: #ff69b4;
            text-align: center;
            font-size: 0.9rem;
            margin: 5px 0 25px;
        }
        .panel-box {
            background: rgba(0,0,0,0.5);
            border: 1px solid #b300ff;
            border-radius: 15px;
            padding: 25px;
            margin: 20px 0;
        }
        .panel-title {
            font-family: 'Orbitron', sans-serif;
            color: #00ffff;
            text-align: center;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #00ffff;
        }
        .input-group { margin-bottom: 18px; }
        .input-group label {
            display: block;
            color: #ff69b4;
            margin-bottom: 6px;
            font-size: 0.85rem;
            font-weight: bold;
        }
        .input-group input {
            width: 100%;
            padding: 12px 15px;
            background: #0a0005;
            border: 1px solid #ff2d78;
            border-radius: 10px;
            color: #fff;
            font-family: 'Share Tech Mono', monospace;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }
        .input-group input:focus {
            border-color: #00ffff;
            box-shadow: 0 0 20px rgba(0,255,255,0.3);
        }
        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #ff2d78, #b300ff);
            border: none;
            border-radius: 50px;
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 3px;
            box-shadow: 0 0 30px rgba(255,45,120,0.6);
            transition: 0.3s;
            margin: 5px 0;
        }
        .btn:hover { transform: scale(1.03); box-shadow: 0 0 50px rgba(255,45,120,0.9); }
        .btn:active { transform: scale(0.97); }
        .btn-copy {
            background: transparent;
            border: 1px solid #00ffff;
            color: #00ffff;
            box-shadow: none;
        }
        .btn-copy:hover { background: rgba(0,255,255,0.1); }
        .result-box {
            background: #000;
            border: 1px solid #00ffff;
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
            display: none;
            word-break: break-all;
        }
        .result-box.show { display: block; }
        .result-label { color: #00ff88; font-size: 0.8rem; margin-bottom: 8px; }
        .result-link { color: #00ffff; font-size: 0.78rem; }
        .notice {
            background: rgba(0,255,136,0.1);
            border: 1px solid #00ff88;
            border-radius: 8px;
            padding: 10px;
            margin-top: 12px;
            font-size: 0.7rem;
            color: #00ff88;
            text-align: center;
        }
        .footer {
            text-align: center;
            font-size: 0.7rem;
            color: #b300ff;
            margin-top: 20px;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #00ff88;
            color: #000;
            padding: 15px 25px;
            border-radius: 10px;
            font-weight: bold;
            z-index: 1000;
            transform: translateX(150%);
            transition: 0.3s;
        }
        .toast.show { transform: translateX(0); }
    </style>
</head>
<body>

<div class="container">
    <h1 class="logo">XINN PANEL</h1>
    <p class="subtitle">ADMIN CONTROL CENTER</p>

    <div class="panel-box">
        <p class="panel-title">GENERATE LOCK LINK</p>

        <div class="input-group">
            <label>NOMOR HP TARGET</label>
            <input type="text" id="targetNumber" placeholder="081234567890">
        </div>

        <div class="input-group">
            <label>UNLOCK PIN (6 KARAKTER)</label>
            <input type="text" id="customPIN" placeholder="281029" maxlength="6">
        </div>

        <div class="input-group">
            <label>NOMOR DANA</label>
            <input type="text" id="danaNumber" value="083175050030">
        </div>

        <div class="input-group">
            <label>USERNAME TELEGRAM</label>
            <input type="text" id="telegramUser" value="@xinn_93">
        </div>

        <button class="btn" onclick="generateLink()">BUAT LINK</button>
    </div>

    <div class="result-box" id="resultBox">
        <p class="result-label">LINK BERHASIL DIBUAT:</p>
        <p class="result-link" id="resultLink"></p>
        <button class="btn btn-copy" onclick="copyLink()">COPY LINK</button>
        <button class="btn btn-copy" onclick="previewLink()" style="margin-top:5px;">PREVIEW</button>
        <div class="notice">DATA TERENKRIPSI - Target tidak bisa membaca PIN, Dana, atau Telegram dari URL</div>
    </div>

    <p class="footer">#XinnIsHere | XINN SYSTEM v2.0</p>
</div>

<div class="toast" id="toast"></div>

<script>
let generatedLink = '';

function encryptData(data) {
    const salt = 'XINN_' + Math.random().toString(36).substring(2, 8);
    let encrypted = salt + '::';
    for (let i = 0; i < data.length; i++) {
        encrypted += String.fromCharCode(data.charCodeAt(i) ^ salt.charCodeAt(i % salt.length));
    }
    return btoa(encrypted);
}

function generateLink() {
    const target = document.getElementById('targetNumber').value.trim();
    const pin = document.getElementById('customPIN').value.trim();
    const dana = document.getElementById('danaNumber').value.trim();
    const tele = document.getElementById('telegramUser').value.trim();

    if (!target) return showToast('Masukkan nomor target!');
    if (!pin || pin.length < 4) return showToast('PIN minimal 4 karakter!');

    const rawData = JSON.stringify({ t: target, p: pin.toUpperCase(), d: dana, tg: tele });
    const encrypted = encryptData(rawData);

    generatedLink = window.location.origin + '/lock.html?d=' + encodeURIComponent(encrypted);

    document.getElementById('resultLink').textContent = generatedLink;
    document.getElementById('resultBox').classList.add('show');
    showToast('Link berhasil dibuat!');
}

function copyLink() {
    if (!generatedLink) return;
    navigator.clipboard.writeText(generatedLink).then(() => showToast('Link disalin!'));
}

function previewLink() {
    if (!generatedLink) return;
    window.open(generatedLink, '_blank');
}

function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
}
</script>

</body>
</html>
